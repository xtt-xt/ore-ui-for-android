name: Build Android CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compile APK & AAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release AAR (Library)
        run: ./gradlew :OreUI:assembleRelease

      - name: Build Debug APK (Demo App)
        run: ./gradlew :app:assembleDebug

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: OreUI-release-aar
          path: OreUI/build/outputs/aar/OreUI-release.aar

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
